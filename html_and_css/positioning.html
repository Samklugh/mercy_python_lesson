<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Positions</title>
    <link rel="stylesheet" href="positioning.css" />
  </head>
  <body>
    <!-- <h1>CSS Positioning</h1> -->
    <!-- <p>There are 5 different types of CSS positioning:</p> -->
    <!-- <ul> -->
    <!-- <li> -->
    <!-- <strong>Static</strong>: The default position for all elements. They are -->
    <!-- positioned according to the normal flow of the document. -->
    <!-- </li> -->
    <!-- <li> -->
    <!-- <strong>Relative</strong>: The element is positioned relative to its -->
    <!-- normal position. You can use the top, right, bottom, and left properties -->
    <!-- to move it from its normal position. -->
    <!-- </li> -->
    <!-- <li> -->
    <!-- <strong>Absolute</strong>: The element is positioned relative to its -->
    <!-- nearest positioned ancestor (not static). If there is no such ancestor, -->
    <!-- it is positioned relative to the initial containing block (usually the -->
    <!-- viewport). -->
    <!-- </li> -->
    <!-- <li> -->
    <!-- <strong>Fixed</strong>: The element is positioned relative to the -->
    <!-- viewport, which means it stays in the same place even when the page is -->
    <!-- scrolled. -->
    <!-- </li> -->
    <!-- <li> -->
    <!-- <strong>Sticky</strong>: The element is treated as relative until it -->
    <!-- crosses a specified threshold, at which point it becomes fixed. -->
    <!-- </li> -->
    <!-- </ul> -->
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
    <main>
      <div class="absolute"></div>
    </main>
  </body>
</html>
